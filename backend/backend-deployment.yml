apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 992382539141.dkr.ecr.us-east-1.amazonaws.com/shopping-site-backend:c0a216a8761ba071ba3a7766c90b005c9253ae31
          ports:
            - containerPort: 5000
