  selector:
    matchLabels:
      app: phones
  template:
    metadata:
      labels:
        app: phones
    spec:
      containers:
      - name: phones
        image: 992382539141.dkr.ecr.us-east-1.amazonaws.com/shopping-site-phones:c0a216a8761ba071ba3a7766c90b005c9253ae31
        ports:
        - containerPort: 80
