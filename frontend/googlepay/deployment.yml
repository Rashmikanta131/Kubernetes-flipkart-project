apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 992382539141.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlepay:c0a216a8761ba071ba3a7766c90b005c9253ae31
        ports:
        - containerPort: 80
