apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 992382539141.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googleclothes:c0a216a8761ba071ba3a7766c90b005c9253ae31
        ports:
        - containerPort: 80
