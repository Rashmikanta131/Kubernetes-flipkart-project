apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 992382539141.dkr.ecr.us-east-1.amazonaws.com/shopping-site-googlegrocery:c0a216a8761ba071ba3a7766c90b005c9253ae31
        ports:
        - containerPort: 80
