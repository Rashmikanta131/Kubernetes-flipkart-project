apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 992382539141.dkr.ecr.us-east-1.amazonaws.com/shopping-site-main:c0a216a8761ba071ba3a7766c90b005c9253ae31
        ports:
        - containerPort: 80

